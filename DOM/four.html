<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>four DOM</title>
</head>
<body style="background-color: gray; color:black;">
    <ul class = language>
        <li> javascript</li>


    </ul>
</body>
<script>

    function AddLanguage(name) {
        let li= document.createElement("li");
        li.innerHTML = `${name}`;
        document.querySelector(".language").appendChild(li)
    }
     AddLanguage("python");
     AddLanguage("C sharp");

    //optimized code for this
    function AddOptiLnaguage(name){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(name))
        document.querySelector(".language").appendChild(li) 

    }
     AddLanguage("java");

     //Edit the content of the element
      let content =document.querySelector('li:nth-child(1)')
      const newli = document.createElement('li')
        newli.appendChild(document.createTextNode("ruby"))
        content.replaceWith(newli)


</script>
</html>
